{{- $src := .Destination -}}
{{- if or (strings.HasPrefix $src "http://") (strings.HasPrefix $src "https://") -}}
  <img src="{{ $src }}" alt="{{ .Text }}">
{{- else if strings.HasPrefix $src "/" -}}
  <img src="{{ $src | relURL }}" alt="{{ .Text }}">
{{- else -}}
  {{- $base := printf "/%s" .Page.File.Dir -}}  <!-- posts/2026-03-25/ -->
  <img src="{{ (path.Join $base $src) | relURL }}" alt="{{ .Text }}">
{{- end -}}
